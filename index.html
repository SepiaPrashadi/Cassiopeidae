<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prana</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ed7143; /* Soft, warm background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #230220;
        }
        h1 {
            font-size: 4rem;
            text-align: center;
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
    </style>
</head>
<body>
    <h1>Як не віруєш, так і не спасесся!</h1>
</body>
</html>
